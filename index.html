<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promoções BR</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    #busca {
      width: 90%;
      padding: 10px;
      margin: 15px auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px;
    }

    .produto {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .produto h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .produto a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: #ff6600;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  🔥 Promoções BR
</header>

<input type="text" id="busca" placeholder="Buscar promoção...">

<div class="container">

  <div class="produto" data-nome="fone bluetooth">
    <h2>Fone Bluetooth barato</h2>
    <a href="https://exemplo.com" target="_blank">Comprar</a>
  </div>

  <div class="produto" data-nome="smartwatch">
    <h2>Smartwatch promoção</h2>
    <a href="https://exemplo.com" target="_blank">Comprar</a>
  </div>

  <div class="produto" data-nome="cabo usb">
    <h2>Cabo USB rápido</h2>
    <a href="https://exemplo.com" target="_blank">Comprar</a>
  </div>

</div>

<script>
const input = document.getElementById("busca");
const produtos = document.querySelectorAll(".produto");

input.addEventListener("input", () => {
  let valor = input.value.toLowerCase();

  produtos.forEach(produto => {
    let nome = produto.getAttribute("data-nome");

    if (nome.includes(valor)) {
      produto.style.display = "block";
    } else {
      produto.style.display = "none";
    }
  });
});
</script>

</body>
</html>
